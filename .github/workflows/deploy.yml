name: Build and Deploy to Docker Hub

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  IMAGE_NAME: daniellopezcarrillo/klywo-sparkle-launch

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Log in to Docker Hub
      if: github.event_name != 'pull_request'
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Extract metadata
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: ${{ env.IMAGE_NAME }}
        tags: |
          type=ref,event=branch
          type=ref,event=pr
          type=sha,prefix={{branch}}-
          type=raw,value=latest,enable={{is_default_branch}}

    - name: Build and push Docker image
      uses: docker/build-push-action@v5
      with:
        context: .
        push: ${{ github.event_name != 'pull_request' }}
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        cache-from: type=gha
        cache-to: type=gha,mode=max
        build-args: |
          VITE_SUPABASE_URL=https://gvxljxkmlckefbbjenwq.supabase.co
          VITE_SUPABASE_ANON_KEY=eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imd2eGxqeGttbGNrZWZiYmplbndxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTMzMjkxMzEsImV4cCI6MjA2ODkwNTEzMX0.uC9pPr7gFUmiJ4_vITz18P0gUhxtVc1mrspqo0Y50Mg
          VITE_STRIPE_PUBLIC_KEY=pk_live_51RLOYYKaCjM8mKvqIi4n5DSDovD56fVfAX28IiKQ5swXD3gnYUmEZFkDWeQ2WiB4niSQqZ2Ko0UUZzEMn4rH66ek00kaLIyHjF

  deploy-info:
    needs: build-and-push
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    
    steps:
    - name: Create deployment info
      run: |
        echo "🚀 Despliegue exitoso!"
        echo "Imagen disponible en: Docker Hub (${{ env.IMAGE_NAME }})"
        echo "Última etiqueta: ${{ needs.build-and-push.outputs.tags }}"
        echo ""
        echo "Para actualizar en Portainer:"
        echo "1. Ve a tu stack en Portainer"
        echo "2. Activa 'Pull latest image versions'"
        echo "3. Haz clic en 'Update the stack'"
        echo "4. Portainer descargará automáticamente la nueva imagen"